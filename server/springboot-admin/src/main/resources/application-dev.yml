# 开发环境配置 (敏感信息通过环境变量覆盖)
spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/virtualwife_admin?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:3}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

virtualwife:
  django:
    api-url: http://localhost:8000
  rag:
    api-url: http://localhost:5001
  minio:
    endpoint: http://localhost:9000
    external-endpoint: http://10.0.2.2:9000
    bucket: virtual-knowledge

logging:
  level:
    com.virtualwife.admin: DEBUG
    org.springframework.security: DEBUG
