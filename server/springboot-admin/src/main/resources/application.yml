server:
  port: 8080
  servlet:
    context-path: /api/admin
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: virtualwife-admin
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/virtualwife_admin?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:3}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
  cache:
    type: simple
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# JWT (生产环境必须通过环境变量设置随机密钥)
jwt:
  secret: ${JWT_SECRET:please-change-this-to-a-random-secret-key-at-least-32-chars}
  expiration: ${JWT_EXPIRATION:86400000}

# 虚拟数字人系统配置
virtualwife:
  django:
    api-url: http://localhost:8000
  rag:
    api-url: http://localhost:5001
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    external-endpoint: ${MINIO_EXTERNAL_ENDPOINT:http://10.0.2.2:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:virtual-knowledge}

# Knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'VirtualWife Admin API'
      paths-to-match: '/**'
      packages-to-scan: com.virtualwife.admin
