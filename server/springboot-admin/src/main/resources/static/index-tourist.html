<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI数字人导游</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-deep:#0a0e27;
  --bg-card:rgba(255,255,255,0.04);
  --bg-glass:rgba(255,255,255,0.06);
  --accent:#00d4ff;
  --accent2:#7c3aed;
  --accent3:#06ffa5;
  --text:#e8eaf6;
  --text-dim:rgba(232,234,246,0.5);
  --border:rgba(255,255,255,0.08);
  --glow:0 0 30px rgba(0,212,255,0.15);
  --radius:16px;
}
html,body{height:100%;font-family:'Noto Sans SC',sans-serif;background:var(--bg-deep);color:var(--text);overflow:hidden}

/* ===== NAV ===== */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:64px;background:rgba(10,14,39,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:'ZCOOL KuaiLe',sans-serif;font-size:22px;color:var(--accent)}
.nav-logo svg{width:32px;height:32px}
.nav-tabs{display:flex;gap:4px;background:var(--bg-glass);border-radius:12px;padding:4px}
.nav-tab{padding:8px 24px;border-radius:10px;border:none;background:transparent;color:var(--text-dim);font-size:14px;font-weight:500;cursor:pointer;transition:all .3s;font-family:inherit}
.nav-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 20px rgba(0,212,255,0.3)}
.nav-tab:hover:not(.active){color:var(--text);background:rgba(255,255,255,0.06)}
.nav-status{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-dim)}
.nav-status .dot{width:8px;height:8px;border-radius:50%;background:var(--accent3);box-shadow:0 0 8px var(--accent3);animation:pulse 2s infinite}

/* ===== MAIN LAYOUT ===== */
.main{display:flex;height:100vh;padding-top:64px}

/* ===== DEEP EXPERIENCE MODE ===== */
.mode-deep{display:flex;width:100%;height:100%}
.deep-left{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.deep-right{width:420px;display:flex;flex-direction:column;border-left:1px solid var(--border);background:rgba(10,14,39,0.6)}

/* Digital Human Area */
.avatar-stage{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.avatar-glow{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,255,0.12) 0%,transparent 70%);animation:glowPulse 4s ease-in-out infinite}
.avatar-container{position:relative;width:280px;height:360px;display:flex;align-items:center;justify-content:center}
.avatar-placeholder{width:220px;height:300px;border-radius:120px 120px 60px 60px;background:linear-gradient(180deg,rgba(0,212,255,0.15),rgba(124,58,237,0.1));border:2px solid rgba(0,212,255,0.2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;position:relative;overflow:hidden}
.avatar-placeholder::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 60%,rgba(0,212,255,0.05));pointer-events:none}
.avatar-placeholder .face{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:36px}
.avatar-name{font-family:'ZCOOL KuaiLe',sans-serif;font-size:18px;color:var(--accent);margin-top:8px}
.avatar-status{font-size:12px;color:var(--text-dim)}
.avatar-emotion{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px}
.emotion-tag{padding:4px 12px;border-radius:20px;font-size:11px;background:var(--bg-glass);border:1px solid var(--border);color:var(--text-dim)}

/* Chat Panel in Deep Mode */
.chat-panel{display:flex;flex-direction:column;height:100%}
.chat-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.chat-header h3{font-size:16px;font-weight:500}
.chat-header .mode-badge{padding:4px 12px;border-radius:20px;font-size:11px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.chat-messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.1) transparent}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.msg{display:flex;gap:12px;max-width:85%;animation:msgIn .4s ease}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.msg.user .msg-avatar{background:linear-gradient(135deg,#7c3aed,#a855f7)}
.msg.ai .msg-avatar{background:linear-gradient(135deg,#00d4ff,#0ea5e9)}
.msg-bubble{padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.6}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--accent2),#9333ea);border-bottom-right-radius:4px}
.msg.ai .msg-bubble{background:var(--bg-glass);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-time{font-size:11px;color:var(--text-dim);margin-top:4px}
.msg.user .msg-time{text-align:right}

.chat-input-area{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:12px;align-items:flex-end}
.chat-input{flex:1;background:var(--bg-glass);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:14px;font-family:inherit;resize:none;outline:none;min-height:44px;max-height:120px;transition:border-color .3s}
.chat-input:focus{border-color:var(--accent)}
.chat-input::placeholder{color:var(--text-dim)}
.send-btn{width:44px;height:44px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;flex-shrink:0}
.send-btn:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(0,212,255,0.3)}
.send-btn:active{transform:scale(0.95)}
.send-btn svg{width:20px;height:20px}

/* ===== CHAT MODE ===== */
.mode-chat{display:none;width:100%;height:100%;flex-direction:column}
.mode-chat .chat-messages{padding:24px 32px;max-width:800px;margin:0 auto;width:100%}
.mode-chat .chat-input-area{max-width:800px;margin:0 auto;width:100%;padding:16px 32px}

/* Welcome Message */
.welcome-msg{text-align:center;padding:40px 20px;color:var(--text-dim)}
.welcome-msg h2{font-family:'ZCOOL KuaiLe',sans-serif;font-size:28px;color:var(--text);margin-bottom:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.welcome-msg p{font-size:14px;line-height:1.8}

/* Quick Actions */
.quick-actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:20px}
.quick-btn{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--bg-glass);color:var(--text-dim);font-size:13px;cursor:pointer;transition:all .3s;font-family:inherit}
.quick-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,0.06)}

/* Loading Dots */
.typing{display:flex;gap:4px;padding:8px 0}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:typing 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

/* ===== ANIMATIONS ===== */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes glowPulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.1);opacity:1}}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes typing{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .nav{padding:0 16px}
  .nav-status{display:none}
  .mode-deep{flex-direction:column}
  .deep-left{height:40%}
  .deep-right{width:100%;flex:1;border-left:none;border-top:1px solid var(--border)}
  .avatar-container{width:160px;height:200px}
  .avatar-placeholder{width:130px;height:180px;border-radius:80px 80px 40px 40px}
  .avatar-placeholder .face{width:50px;height:50px;font-size:24px}
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
</style>
</head>
<body>

<!-- NAVIGATION -->
<nav class="nav">
  <div class="nav-logo">
    <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2"/><circle cx="16" cy="16" r="6" fill="currentColor" opacity=".3"/><path d="M16 8v16M8 16h16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    AI数字人导游
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchMode('deep')">深度体验</button>
    <button class="nav-tab" onclick="switchMode('chat')">聊天模式</button>
  </div>
  <div class="nav-status">
    <span class="dot"></span>
    <span>服务在线</span>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="main">

  <!-- 深度体验模式 -->
  <div class="mode-deep" id="modeDeep">
    <div class="deep-left">
      <div class="avatar-stage">
        <div class="avatar-glow"></div>
        <div class="avatar-container" style="animation:float 6s ease-in-out infinite">
          <div class="avatar-placeholder">
            <div class="face">🧑‍🏫</div>
            <div class="avatar-name" id="avatarNameDisplay">AI导游</div>
            <div class="avatar-status">等待对话中...</div>
          </div>
        </div>
      </div>
      <div class="avatar-emotion">
        <span class="emotion-tag">😊 开心</span>
        <span class="emotion-tag">🎯 专注</span>
        <span class="emotion-tag">💡 灵感</span>
      </div>
    </div>
    <div class="deep-right">
      <div class="chat-panel">
        <div class="chat-header">
          <h3>💬 对话</h3>
          <span class="mode-badge">深度体验</span>
        </div>
        <div class="chat-messages" id="chatMessagesDeep">
          <div class="welcome-msg">
            <h2>欢迎来到AI数字人导游</h2>
            <p>我是您的专属AI导游，可以为您介绍景点、推荐路线、回答问题。<br>请开始对话吧！</p>
            <div class="quick-actions">
              <button class="quick-btn" onclick="sendQuick('请介绍一下这个景区')">🏛️ 景区介绍</button>
              <button class="quick-btn" onclick="sendQuick('推荐一条游览路线')">🗺️ 路线推荐</button>
              <button class="quick-btn" onclick="sendQuick('附近有什么美食推荐')">🍜 美食推荐</button>
              <button class="quick-btn" onclick="sendQuick('今天天气怎么样')">🌤️ 天气查询</button>
            </div>
          </div>
        </div>
        <div class="chat-input-area">
          <textarea class="chat-input" id="chatInputDeep" placeholder="输入消息..." rows="1" onkeydown="handleKeyDown(event,'deep')"></textarea>
          <button class="send-btn" onclick="sendMessage('deep')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 聊天模式 -->
  <div class="mode-chat" id="modeChat">
    <div class="chat-messages" id="chatMessagesChat">
      <div class="welcome-msg">
        <h2>聊天模式</h2>
        <p>纯文字对话，专注于问答体验。<br>输入任何问题，AI导游将为您解答。</p>
        <div class="quick-actions">
          <button class="quick-btn" onclick="sendQuickChat('请介绍一下这个景区')">🏛️ 景区介绍</button>
          <button class="quick-btn" onclick="sendQuickChat('推荐一条游览路线')">🗺️ 路线推荐</button>
          <button class="quick-btn" onclick="sendQuickChat('附近有什么美食推荐')">🍜 美食推荐</button>
        </div>
      </div>
    </div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chatInputChat" placeholder="输入消息..." rows="1" onkeydown="handleKeyDown(event,'chat')"></textarea>
      <button class="send-btn" onclick="sendMessage('chat')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      </button>
    </div>
  </div>

</div>

<script>
const API_BASE = 'http://localhost:8080/api/admin';
let sessionId = null;
let isLoading = false;

// Mode Switch
function switchMode(mode) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('modeDeep').style.display = mode === 'deep' ? 'flex' : 'none';
  document.getElementById('modeChat').style.display = mode === 'chat' ? 'flex' : 'none';
  event.target.classList.add('active');
}

// Send Message
async function sendMessage(mode) {
  const input = document.getElementById(mode === 'deep' ? 'chatInputDeep' : 'chatInputChat');
  const msg = input.value.trim();
  if (!msg || isLoading) return;

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;

  const container = document.getElementById(mode === 'deep' ? 'chatMessagesDeep' : 'chatMessagesChat');

  // Remove welcome message
  const welcome = container.querySelector('.welcome-msg');
  if (welcome) welcome.remove();

  // Add user message
  appendMessage(container, 'user', msg);

  // Add loading indicator
  const loadingEl = document.createElement('div');
  loadingEl.className = 'msg ai';
  loadingEl.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div>
      <div class="msg-bubble">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>
    </div>
  `;
  container.appendChild(loadingEl);
  container.scrollTop = container.scrollHeight;

  try {
    const res = await fetch(API_BASE + '/chat/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, sessionId: sessionId })
    });

    const data = await res.json();

    // Remove loading
    loadingEl.remove();

    if (data.code === 200 || data.code === 0) {
      sessionId = data.data.sessionId;
      appendMessage(container, 'ai', data.data.reply);
    } else {
      appendMessage(container, 'ai', '抱歉，服务暂时不可用，请稍后再试。');
    }
  } catch (e) {
    loadingEl.remove();
    appendMessage(container, 'ai', '网络连接失败，请检查服务是否启动。');
  }

  isLoading = false;
}

function sendQuick(msg) {
  document.getElementById('chatInputDeep').value = msg;
  sendMessage('deep');
}

function sendQuickChat(msg) {
  document.getElementById('chatInputChat').value = msg;
  sendMessage('chat');
}

function appendMessage(container, role, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  el.innerHTML = `
    <div class="msg-avatar">${role === 'user' ? '👤' : '🤖'}</div>
    <div>
      <div class="msg-bubble">${escapeHtml(text)}</div>
      <div class="msg-time">${time}</div>
    </div>
  `;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML.replace(/\n/g, '<br>');
}

function handleKeyDown(e, mode) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(mode);
  }
}

// Auto-resize textarea
document.querySelectorAll('.chat-input').forEach(el => {
  el.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
});

// Fetch avatar list on load
async function loadAvatars() {
  try {
    const res = await fetch(API_BASE + '/chat/avatars');
    const data = await res.json();
    if (data.code === 200 && data.data && data.data.length > 0) {
      const avatar = data.data[0];
      document.getElementById('avatarNameDisplay').textContent = avatar.avatarName || 'AI导游';
    }
  } catch (e) {
    console.log('加载数字人列表失败');
  }
}

loadAvatars();
</script>
</body>
</html>
